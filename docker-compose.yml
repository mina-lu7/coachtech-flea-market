services:
  app:
    build: ./docker/php
    container_name: flea_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flea_pma
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db

  web:
    image: nginx:1.25-alpine
    container_name: flea_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: flea_db
    environment:
      MYSQL_DATABASE: flea_db
      MYSQL_USER: flea_user
      MYSQL_PASSWORD: flea_pass
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    container_name: flea_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data: